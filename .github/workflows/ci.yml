name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      # golangci-lint catches style issues, unused vars, shadowed errors, etc.
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      # testcontainers-go needs Docker — ubuntu-latest has it built in
      - name: Run tests
        run: go test ./... -race -timeout 120s

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binary
        run: CGO_ENABLED=0 go build -o snippy ./cmd/api

      # Build the Docker image so Trivy has something to scan
      - name: Build Docker image
        run: docker build -t snippy:${{ github.sha }} .

      # Trivy scans for known CVEs in the image — fails on CRITICAL findings
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: snippy:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL

  # This job name is used by branch protection — do not rename it
  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    steps:
      - run: echo "All checks passed"
